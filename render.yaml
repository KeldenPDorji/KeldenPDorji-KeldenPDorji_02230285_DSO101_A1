services:
  # Backend Web Service — builds from Dockerfile on every git push
  - type: web
    name: be-todo
    env: docker
    dockerfilePath: ./todo-app/backend/Dockerfile
    dockerContext: ./todo-app/backend
    plan: free
    region: singapore
    autoDeploy: true
    envVars:
      - key: DB_HOST
        value: SET_VIA_RENDER_DASHBOARD
      - key: DB_USER
        value: SET_VIA_RENDER_DASHBOARD
      - key: DB_PASSWORD
        value: SET_VIA_RENDER_DASHBOARD
      - key: DB_NAME
        value: SET_VIA_RENDER_DASHBOARD
      - key: DB_PORT
        value: "5432"
      - key: DB_SSL
        value: "true"
      - key: PORT
        value: "5000"

  # Frontend Web Service — builds from Dockerfile on every git push
  - type: web
    name: fe-todo
    env: docker
    dockerfilePath: ./todo-app/frontend/Dockerfile
    dockerContext: ./todo-app/frontend
    plan: free
    region: singapore
    autoDeploy: true
    envVars:
      - key: REACT_APP_API_URL
        value: https://be-todo-ppwq.onrender.com
